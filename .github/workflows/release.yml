name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'
  CSC_IDENTITY: ''

jobs:
  build:
    name: Build (${{ matrix.platform }} / ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            platform: mac
            arch: arm64
            artifact_glob: |
              release/MyReader-v*-mac-*.dmg
              release/MyReader-v*-mac-*.zip
          - os: macos-15-intel
            platform: mac
            arch: x64
            artifact_glob: |
              release/MyReader-v*-mac-*.dmg
              release/MyReader-v*-mac-*.zip
          - os: windows-latest
            platform: win
            arch: x64
            artifact_glob: release/MyReader-v*-win-*.exe
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact_glob: |
              release/MyReader-v*-linux-*.AppImage
              release/MyReader-v*-linux-*.deb
              release/*.AppImage
              release/my-reader_*.deb
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            artifact_glob: |
              release/MyReader-v*-linux-*.AppImage
              release/MyReader-v*-linux-*.deb
              release/*.AppImage
              release/my-reader_*.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/check-release-version.mjs

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: bash scripts/ci-install-linux-build-deps.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate macOS icon
        if: matrix.platform == 'mac'
        run: pnpm run icons

      - name: Package (${{ matrix.platform }} / ${{ matrix.arch }})
        run: node scripts/ci-package.mjs
        env:
          CI_PLATFORM: ${{ matrix.platform }}
          CI_ARCH: ${{ matrix.arch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_SYSTEM_FUSE: 'true'

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-dist
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/MyReader-v*.dmg
            artifacts/**/MyReader-v*.zip
            artifacts/**/MyReader-v*.exe
            artifacts/**/MyReader-v*.AppImage
            artifacts/**/MyReader-v*.deb
          generate_release_notes: true
          body: |
            首个 MVP 公开发布。完整变更见 [CHANGELOG.md](https://github.com/tagecode/my-reader/blob/main/CHANGELOG.md)。

            ## 安装说明

            产物命名：`MyReader-v{version}-{os}-{arch}.{ext}`

            | 平台 | 架构 | 格式 | 说明 |
            |------|------|------|------|
            | macOS | arm64 | `.dmg` / `.zip` | Apple Silicon |
            | macOS | x64 | `.dmg` / `.zip` | Intel Mac |
            | Windows | x64 | `.exe` (NSIS) | 安装包 |
            | Linux | x64 / arm64 | `.AppImage` / `.deb` | AppImage 免安装；deb 用 `sudo dpkg -i` 安装 |

            ## 代码签名说明

            当前构建**未进行 Apple / Windows 代码签名**（CI 中 `CSC_IDENTITY_AUTO_DISCOVERY=false`）。

            - **macOS**：首次打开可能提示「无法验证开发者」。请在「系统设置 → 隐私与安全性」中点击「仍要打开」，或右键应用选择「打开」。
            - **Windows**：SmartScreen 可能显示「未知发布者」警告，属未签名安装包的常见现象。

            纯本地阅读器，支持 EPUB / TXT / PDF，书库与进度保存在本机。
